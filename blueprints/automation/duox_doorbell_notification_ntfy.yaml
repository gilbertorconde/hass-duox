blueprint:
  name: Duox Doorbell Notification (ntfy)
  description: >
    Doorbell notification flow using ntfy integration. Keeps the same Duox
    lifecycle handling as the native mobile_app blueprint (ring -> attended /
    ended / missed), with race-safe guards and stable sequence updates.
  domain: automation
  source_url: https://github.com/gilbertorconde/hass-duox/blob/main/blueprints/automation/duox_doorbell_notification_ntfy.yaml
  input:
    doorbell_entity:
      name: Doorbell sensor
      description: The Duox doorbell binary sensor entity.
      selector:
        entity:
          domain: binary_sensor

    ntfy_notifier:
      name: ntfy notify entity
      description: Notify entity created by the ntfy integration (notify.*).
      selector:
        entity:
          domain: notify

    dashboard_path:
      name: Intercom dashboard path
      description: URL opened when tapping the ntfy notification.
      default: /dashboard-doorbell/0
      selector:
        text:

    autoconnect:
      name: Auto-connect on tap
      description: Append autoconnect query when opening the dashboard.
      default: true
      selector:
        boolean:

    timeout_seconds:
      name: Timeout (seconds)
      description: Seconds to keep ringing before marking as missed.
      default: 90
      selector:
        number:
          min: 15
          max: 300
          step: 5
          unit_of_measurement: s

    ring_interval:
      name: Ring interval (seconds)
      description: Seconds between repeated ring updates.
      default: 8
      selector:
        number:
          min: 3
          max: 30
          step: 1
          unit_of_measurement: s

mode: restart
max_exceeded: silent

trigger:
  - platform: state
    entity_id: !input doorbell_entity
    from: "off"
    to: "on"

variables:
  doorbell_sensor: !input doorbell_entity
  notify_target: !input ntfy_notifier
  dashboard: !input dashboard_path
  auto: !input autoconnect
  click_action: >
    {{ dashboard ~ ('?autoconnect=1' if auto else '') }}
  timeout_s: !input timeout_seconds
  interval_s: !input ring_interval
  max_rings: "{{ (timeout_s / interval_s) | int }}"
  seq_id: >
    {{ 'duox_' ~ (doorbell_sensor | replace('.', '_')) ~ '_' ~ now().strftime('%Y%m%d%H%M%S') }}

action:
  # --- Initial ring notification ---
  - action: ntfy.publish
    target:
      entity_id: !input ntfy_notifier
    data:
      title: "Doorbell"
      message: "Someone is at the door"
      priority: "5"
      click: "{{ click_action }}"
      tags:
        - rotating_light
        - doorbell
      sequence_id: "{{ seq_id }}"

  # --- Repeat ring loop ---
  - repeat:
      count: "{{ max_rings }}"
      sequence:
        - variables:
            ring_num: "{{ repeat.index + 1 }}"

        - wait_for_trigger:
            - platform: event
              event_type: duox_call_attended
              id: attended
            - platform: event
              event_type: duox_call_ended
              id: ended
            - platform: state
              entity_id: !input doorbell_entity
              from: "on"
              to: "off"
              id: cleared
          timeout:
            seconds: "{{ interval_s }}"

        - choose:
            # Call answered
            - conditions:
                - condition: template
                  value_template: "{{ wait.trigger is not none and wait.trigger.id == 'attended' }}"
              sequence:
                - action: ntfy.publish
                  target:
                    entity_id: !input ntfy_notifier
                  data:
                    title: "Call answered"
                    message: "Call was answered"
                    priority: "3"
                    click: "{{ dashboard }}"
                    sequence_id: "{{ seq_id }}"
                - stop: "Call attended"

            # Call ended (no one picked up)
            - conditions:
                - condition: template
                  value_template: "{{ wait.trigger is not none and wait.trigger.id == 'ended' }}"
              sequence:
                - action: ntfy.publish
                  target:
                    entity_id: !input ntfy_notifier
                  data:
                    title: "Missed call"
                    message: "You missed a doorbell ring"
                    priority: "3"
                    click: "{{ dashboard }}"
                    sequence_id: "{{ seq_id }}"
                - stop: "Call ended"

            # Doorbell state already cleared (race-safe fallback)
            - conditions:
                - condition: template
                  value_template: "{{ wait.trigger is not none and wait.trigger.id == 'cleared' }}"
              sequence:
                - action: ntfy.publish
                  target:
                    entity_id: !input ntfy_notifier
                  data:
                    title: "Call ended"
                    message: "Doorbell call has ended"
                    priority: "3"
                    click: "{{ dashboard }}"
                    sequence_id: "{{ seq_id }}"
                - stop: "Doorbell state cleared"

          # No trigger fired — re-ring
          default:
            - choose:
                - conditions:
                    - condition: state
                      entity_id: !input doorbell_entity
                      state: "on"
                  sequence:
                    - action: ntfy.publish
                      target:
                        entity_id: !input ntfy_notifier
                      data:
                        title: "Doorbell"
                        message: "Someone is at the door (ring {{ ring_num }})"
                        priority: "5"
                        click: "{{ click_action }}"
                        tags:
                          - rotating_light
                          - doorbell
                        sequence_id: "{{ seq_id }}"
              default:
                - stop: "Doorbell no longer active"

  # --- Timeout reached (loop exhausted without attended/ended) ---
  - choose:
      - conditions:
          - condition: state
            entity_id: !input doorbell_entity
            state: "on"
        sequence:
          - action: ntfy.publish
            target:
              entity_id: !input ntfy_notifier
            data:
              title: "Missed call"
              message: "You missed a doorbell ring"
              priority: "3"
              click: "{{ dashboard }}"
              sequence_id: "{{ seq_id }}"
