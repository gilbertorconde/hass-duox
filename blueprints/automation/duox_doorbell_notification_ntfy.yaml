blueprint:
  name: Duox Doorbell Notification (ntfy)
  description: >
    Doorbell notification flow using ntfy integration. Keeps the same Duox
    lifecycle handling as the native mobile_app blueprint (ring -> attended /
    ended / missed), with race-safe guards and stable sequence updates.
  domain: automation
  source_url: https://github.com/gilbertorconde/hass-duox/blob/main/blueprints/automation/duox_doorbell_notification_ntfy.yaml
  input:
    doorbell_entity:
      name: Doorbell sensor
      description: The Duox doorbell binary sensor entity.
      selector:
        entity:
          domain: binary_sensor

    ntfy_notifier:
      name: ntfy notify entity
      description: Notify entity created by the ntfy integration (notify.*).
      selector:
        entity:
          domain: notify

    dashboard_path:
      name: Intercom dashboard path
      description: Dashboard path or URL opened when tapping the ntfy notification.
      default: /dashboard-doorbell/0
      selector:
        text:

    autoconnect:
      name: Auto-connect on tap
      description: Append autoconnect query when opening the dashboard.
      default: true
      selector:
        boolean:

    notification_icon_url:
      name: Notification icon URL
      description: Image URL used as ntfy notification icon.
      default: https://www.home-assistant.io/images/favicon-192x192.png
      selector:
        text:

    timeout_seconds:
      name: Timeout (seconds)
      description: Seconds to keep ringing before marking as missed.
      default: 90
      selector:
        number:
          min: 15
          max: 300
          step: 5
          unit_of_measurement: s

mode: restart
max_exceeded: silent

trigger:
  - platform: state
    entity_id: !input doorbell_entity
    from: "off"
    to: "on"

variables:
  doorbell_sensor: !input doorbell_entity
  dashboard: !input dashboard_path
  auto: !input autoconnect
  notif_icon: !input notification_icon_url
  click_base: >
    {% set dash = dashboard | trim %}
    {% if '://' in dash %}
      {{ dash }}
    {% else %}
      {{ 'homeassistant://navigate' ~ (dash if dash.startswith('/') else '/' ~ dash) }}
    {% endif %}
  click_action: >
    {% if auto %}
      {{ click_base ~ ('&autoconnect=1' if '?' in click_base else '?autoconnect=1') }}
    {% else %}
      {{ click_base }}
    {% endif %}
  timeout_s: !input timeout_seconds
  seq_id: >
    {{ 'duox_' ~ (doorbell_sensor | replace('.', '_')) ~ '_' ~ now().strftime('%Y%m%d%H%M%S') }}

action:
  # --- Initial ring notification ---
  - action: ntfy.publish
    target:
      entity_id: !input ntfy_notifier
    data:
      title: "Doorbell"
      message: "Someone is at the door"
      priority: "5"
      click: "{{ click_action }}"
      icon: "{{ notif_icon }}"
      tags:
        - rotating_light
        - doorbell
      sequence_id: "{{ seq_id }}"

  # --- Wait for attended/ended/clear, or timeout ---
  - wait_for_trigger:
      - platform: event
        event_type: duox_call_attended
        id: attended
      - platform: event
        event_type: duox_call_ended
        id: ended
      - platform: state
        entity_id: !input doorbell_entity
        from: "on"
        to: "off"
        id: cleared
    timeout:
      seconds: "{{ timeout_s }}"

  - choose:
      # Call answered
      - conditions:
          - condition: template
            value_template: "{{ wait.trigger is not none and wait.trigger.id == 'attended' }}"
        sequence:
          - action: ntfy.publish
            target:
              entity_id: !input ntfy_notifier
            data:
              title: "Call answered"
              message: "Call was answered"
              priority: "3"
              click: "{{ click_base }}"
              icon: "{{ notif_icon }}"
              sequence_id: "{{ seq_id }}"
          - stop: "Call attended"

      # Call ended (no one picked up)
      - conditions:
          - condition: template
            value_template: "{{ wait.trigger is not none and wait.trigger.id == 'ended' }}"
        sequence:
          - action: ntfy.publish
            target:
              entity_id: !input ntfy_notifier
            data:
              title: "Missed call"
              message: "You missed a doorbell ring"
              priority: "3"
              click: "{{ click_base }}"
              icon: "{{ notif_icon }}"
              sequence_id: "{{ seq_id }}"
          - stop: "Call ended"

      # Doorbell state already cleared (race-safe fallback)
      - conditions:
          - condition: template
            value_template: "{{ wait.trigger is not none and wait.trigger.id == 'cleared' }}"
        sequence:
          - action: ntfy.publish
            target:
              entity_id: !input ntfy_notifier
            data:
              title: "Call ended"
              message: "Doorbell call has ended"
              priority: "3"
              click: "{{ click_base }}"
              icon: "{{ notif_icon }}"
              sequence_id: "{{ seq_id }}"
          - stop: "Doorbell state cleared"

  # --- Timeout reached without attended/ended/clear ---
  - choose:
      - conditions:
          - condition: state
            entity_id: !input doorbell_entity
            state: "on"
        sequence:
          - action: ntfy.publish
            target:
              entity_id: !input ntfy_notifier
            data:
              title: "Missed call"
              message: "You missed a doorbell ring"
              priority: "3"
              click: "{{ click_base }}"
              icon: "{{ notif_icon }}"
              sequence_id: "{{ seq_id }}"
