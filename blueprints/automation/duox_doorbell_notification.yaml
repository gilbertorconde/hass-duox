blueprint:
  name: Duox Doorbell Notification
  description: >
    Doorbell notification with repeated ringing, auto-connect, and proper call
    lifecycle handling (ring → attended / missed / ended).
    Mirrors the native Fermax app behavior: sends high-priority push
    notifications that repeat like a phone call, and updates the notification
    when the call is answered elsewhere, ended, or missed.
  domain: automation
  source_url: https://github.com/gilbertorconde/hass-duox/blob/main/blueprints/automation/duox_doorbell_notification.yaml
  input:
    doorbell_entity:
      name: Doorbell sensor
      description: The Duox doorbell binary sensor entity.
      selector:
        entity:
          domain: binary_sensor

    camera_entity:
      name: Camera entity (optional)
      description: Duox camera entity for doorbell snapshot in the notification.
      default: ""
      selector:
        entity:
          domain: camera

    dashboard_path:
      name: Intercom dashboard path
      description: Lovelace path opened when tapping the notification.
      default: /dashboard-doorbell/0
      selector:
        text:

    notify_devices:
      name: Devices to notify
      description: Mobile devices to send notifications to (must have the HA Companion App).
      selector:
        device:
          integration: mobile_app
          multiple: true

    autoconnect:
      name: Auto-connect on tap
      description: Automatically start the video feed when tapping the notification.
      default: true
      selector:
        boolean:

    timeout_seconds:
      name: Timeout (seconds)
      description: Seconds to keep ringing before marking as missed.
      default: 90
      selector:
        number:
          min: 15
          max: 300
          step: 5
          unit_of_measurement: s

    ring_interval:
      name: Ring interval (seconds)
      description: >
        Re-send the notification every N seconds to simulate a phone call
        ringing. Each re-send triggers the notification sound and vibration.
      default: 8
      selector:
        number:
          min: 3
          max: 30
          step: 1
          unit_of_measurement: s

mode: restart
max_exceeded: silent

trigger:
  - platform: state
    entity_id: !input doorbell_entity
    from: "off"
    to: "on"

variables:
  doorbell_sensor: !input doorbell_entity
  notif_tag: >
    {{ 'duox_' ~ (doorbell_sensor | replace('.', '_')) }}
  dashboard: !input dashboard_path
  auto: !input autoconnect
  click_action: >
    {{ dashboard ~ ('?autoconnect=1' if auto else '') }}
  timeout_s: !input timeout_seconds
  interval_s: !input ring_interval
  devices: !input notify_devices
  max_rings: "{{ (timeout_s / interval_s) | int }}"

action:
  # --- Initial ring notification ---
  - repeat:
      for_each: "{{ devices }}"
      sequence:
        - action: >-
            notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify | replace('-', '_') }}
          data:
            title: "Doorbell"
            message: "Someone is at the door"
            data:
              clickAction: "{{ click_action }}"
              tag: "{{ notif_tag }}"
              channel: doorbell
              importance: high
              ttl: 0
              priority: high
              persistent: true

  # --- Repeat ring loop ---
  - repeat:
      count: "{{ max_rings }}"
      sequence:
        - variables:
            ring_num: "{{ repeat.index + 1 }}"

        - wait_for_trigger:
            - platform: event
              event_type: duox_call_attended
              id: attended
            - platform: event
              event_type: duox_call_ended
              id: ended
            - platform: state
              entity_id: !input doorbell_entity
              from: "on"
              to: "off"
              id: cleared
          timeout:
            seconds: "{{ interval_s }}"

        - choose:
            # Call answered on another device
            - conditions:
                - condition: template
                  value_template: "{{ wait.trigger is not none and wait.trigger.id == 'attended' }}"
              sequence:
                - repeat:
                    for_each: "{{ devices }}"
                    sequence:
                      - action: >-
                          notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify | replace('-', '_') }}
                        data:
                          title: "Call answered"
                          message: "Call was answered"
                          data:
                            clickAction: "{{ dashboard }}"
                            tag: "{{ notif_tag }}"
                            channel: doorbell
                            importance: default
                            persistent: false
                            timeout: 30
                - stop: "Call attended"

            # Call ended (no one picked up)
            - conditions:
                - condition: template
                  value_template: "{{ wait.trigger is not none and wait.trigger.id == 'ended' }}"
              sequence:
                - repeat:
                    for_each: "{{ devices }}"
                    sequence:
                      - action: >-
                          notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify | replace('-', '_') }}
                        data:
                          title: "Missed call"
                          message: "You missed a doorbell ring"
                          data:
                            clickAction: "{{ dashboard }}"
                            tag: "{{ notif_tag }}"
                            channel: doorbell
                            importance: default
                            persistent: false
                - stop: "Call ended"

            # Doorbell state already cleared (event race-safe fallback)
            - conditions:
                - condition: template
                  value_template: "{{ wait.trigger is not none and wait.trigger.id == 'cleared' }}"
              sequence:
                - repeat:
                    for_each: "{{ devices }}"
                    sequence:
                      - action: >-
                          notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify | replace('-', '_') }}
                        data:
                          title: "Call ended"
                          message: "Doorbell call has ended"
                          data:
                            clickAction: "{{ dashboard }}"
                            tag: "{{ notif_tag }}"
                            channel: doorbell
                            importance: default
                            persistent: false
                            timeout: 30
                - stop: "Doorbell state cleared"

          # No trigger fired — re-ring
          default:
            - choose:
                - conditions:
                    - condition: state
                      entity_id: !input doorbell_entity
                      state: "on"
                  sequence:
                    - repeat:
                        for_each: "{{ devices }}"
                        sequence:
                          - action: >-
                              notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify | replace('-', '_') }}
                            data:
                              title: "Doorbell"
                              message: "Someone is at the door (ring {{ ring_num }})"
                              data:
                                clickAction: "{{ click_action }}"
                                tag: "{{ notif_tag }}"
                                channel: doorbell
                                importance: high
                                ttl: 0
                                priority: high
                                persistent: true
              default:
                - stop: "Doorbell no longer active"

  # --- Timeout reached (loop exhausted without attended/ended) ---
  - choose:
      - conditions:
          - condition: state
            entity_id: !input doorbell_entity
            state: "on"
        sequence:
          - repeat:
              for_each: "{{ devices }}"
              sequence:
                - action: >-
                    notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify | replace('-', '_') }}
                  data:
                    title: "Missed call"
                    message: "You missed a doorbell ring"
                    data:
                      clickAction: "{{ dashboard }}"
                      tag: "{{ notif_tag }}"
                      channel: doorbell
                      importance: default
                      persistent: false
